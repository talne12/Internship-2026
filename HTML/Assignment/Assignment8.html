<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
     table,th,td{
        border: 1px solid black;
        border-collapse: collapse;
        width:100%;
       margin-bottom: 8px;
       padding: 10PX;
    }
    label{
        
        width: 130PX;
    }
   </style>
</head>
<body>
<form>
    
        <center><h2>Admission Form</h2></center>
    
        <fieldset>
                 <legend style="text-align: center;">Login Details </legend>
                <label for="">Username:</label>
                <input type="name"><br>

                <label for="">Password:</label>
                <input type="Password"><br>
            
    </fieldset>
    <br>

    
            <fieldset>
                <legend style="text-align: center;">Personal Information</legend>
            
                <label for="">Name:</label>
                <input type="text"><br>

                <label for="">Mother Name:</label>
                <input  type="text"><br>

                <label for="">Father Name:</label>
                <input type="text"><br>

                <label for="">Date of birth:</label>
                <input type="date"><br>

                <label for="">Gender</label>
                <input type="radio" name="Gender">Male
                <input type="radio" name="Gender">female
            </fieldset>  
            <BR>
    
                <fieldset>
                    <legend style="text-align: center;">Contact Details</legend>
                
                <label for="">Conatct number:</label>
                <input type="number"><br>

                <label for="">Email ID:</label>
                <input type="email"><br>

                <label for="">Address</label>
                <textarea rows="3" cols="30" placeholder="Enter Address..."></textarea><br>
                
                <label for="">Country:</label>
                <select>
                    <option>India</option>
                    <option>UK</option>
                    <option>Japan</option>
                </select>
            </fieldset>
            <BR>

            <fieldset>
                <legend style="text-align: center;">Academic details</legend>
                <label for="">10th Class Marks:</label>
                <input type="name">
                <label for="">Board:</label>
                <input type="name">
                <label for="">School name:</label>
                <input type="name"><br>
            
                <label for="">12th Class Marks:</label>
                <input type="name">
                <label for="">Board:</label>
                <input type="name">
                <label for="">School name:</label>
                <input type="name"><br>
            </fieldset>
            <br>

    <center><button type="submit">Submit</button></center>
    
</form>
</body>
</html>
